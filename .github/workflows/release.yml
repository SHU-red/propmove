name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Read changelog from the annotated tag message
          body="$(git tag -l --format='%(contents)' "$tag")"

          files=("main.js" "manifest.json" "versions.json")
          [ -s "styles.css" ] && files+=("styles.css")

          gh release create "$tag" \
            --title="$tag" \
            --notes "$body" \
            "${files[@]}"
