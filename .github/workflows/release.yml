name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          prev_tag="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          features=""
          bugfixes=""
          maintenance=""

          if [ -n "$prev_tag" ]; then
            while IFS= read -r line; do
              desc="$(echo "$line" | sed 's/^[a-z]\{1,\}([^)]*): *//i; s/^[a-z]\{1,\}: *//i')"
              [ -z "$desc" ] && continue

              if echo "$line" | grep -qi '^feat'; then
                features="$features  - $desc"$'\n'
              elif echo "$line" | grep -qi '^fix'; then
                bugfixes="$bugfixes  - $desc"$'\n'
              elif echo "$line" | grep -qi '^docs'; then
                features="$features  - $desc"$'\n'
              else
                maintenance="$maintenance  - $desc"$'\n'
              fi
            done < <(git log "$prev_tag..HEAD" --pretty=format:'%s' --no-merges 2>/dev/null || true)
          fi

          body="## $tag"
          [ -n "$features" ]    && body="$body"$'\n\n'"### ✨ Features"$'\n'"$features"
          [ -n "$bugfixes" ]    && body="$body"$'\n\n'"### 🐛 Bug Fixes"$'\n'"$bugfixes"
          [ -n "$maintenance" ] && body="$body"$'\n\n'"### 🔧 Maintenance"$'\n'"$maintenance"

          files=("main.js" "manifest.json" "versions.json")
          [ -s "styles.css" ] && files+=("styles.css")

          gh release create "$tag" \
            --title="$tag" \
            --notes "$body" \
            "${files[@]}"
